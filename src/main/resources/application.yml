spring:
  application:
    name: rag-document-search
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8081

openai:
  api:
    key: ${OPENAI_API_KEY}
    embedding-model: text-embedding-3-small
    chat-model: gpt-4

rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 5

logging:
  level:
    com.pcveldi: DEBUG
